services:
  app_proxy:
    # Umbrel injects and manages the backing app_proxy service image.
    environment:
      APP_HOST: liquid-electrs_app_1
      APP_PORT: 3006

  electrs:
    build:
      context: ${APP_DATA_DIR:-.}/electrs
      dockerfile: Dockerfile
    restart: unless-stopped
    # The supported 16 GiB Umbrel profile caps electrs at 6 GiB and relies on
    # checkpointed initial sync rather than larger container caps.
    mem_limit: ${ELECTRS_MEM_LIMIT:-6g}
    cpus: ${ELECTRS_CPUS:-2.0}
    # Upstream electrs asks RocksDB for up to 100k open files; matching that
    # limit here avoids pathological file-handle churn during initial indexing.
    ulimits:
      nofile:
        soft: ${ELECTRS_NOFILE_SOFT_LIMIT:-100000}
        hard: ${ELECTRS_NOFILE_HARD_LIMIT:-100000}
    environment:
      ELEMENTS_HOST: http://elements_node_1
      ELEMENTS_PORT: ${APP_ELEMENTS_NODE_RPC_PORT:-}
      ELEMENTS_USER: elements
      ELEMENTS_PASS: ${APP_ELEMENTS_RPC_PASS:-}
      ELEMENTS_CONF_DIR: /mnt/elements
      ELECTRS_MEM_LIMIT: ${ELECTRS_MEM_LIMIT:-6g}
      ELECTRS_LOG_LEVEL: ${ELECTRS_LOG_LEVEL:-vv}
      ELECTRS_BANNER: "Umbrel Liquid Electrs"
      ELECTRS_DB_WRITE_BUFFER_SIZE_MB: ${ELECTRS_DB_WRITE_BUFFER_SIZE_MB:-16}
      ELECTRS_DB_BLOCK_CACHE_MB: ${ELECTRS_DB_BLOCK_CACHE_MB:-2}
      ELECTRS_INITIAL_SYNC_BATCH_SIZE: ${ELECTRS_INITIAL_SYNC_BATCH_SIZE:-100}
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${ELEMENTS_DATA_DIR}:/mnt/elements:ro
    ports:
      - "51001:50001"

  app:
    build:
      context: ${APP_DATA_DIR:-.}
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - electrs
    environment:
      PORT: "3006"
      ELEMENTS_HOST: http://elements_node_1
      ELEMENTS_PORT: ${APP_ELEMENTS_NODE_RPC_PORT:-}
      ELEMENTS_USER: elements
      ELEMENTS_PASS: ${APP_ELEMENTS_RPC_PASS:-}
      ELEMENTS_CONF_DIR: /mnt/elements
      ELECTRS_HOST: electrs
      ELECTRS_RPC_PORT: "50001"
      ELECTRUM_LOCAL_SERVICE: ${DEVICE_DOMAIN_NAME:-umbrel.local}
      ELECTRUM_PORT: "51001"
    volumes:
      - ${ELEMENTS_DATA_DIR}:/mnt/elements:ro
